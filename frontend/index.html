<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carbur'Map | Prix carburants France en temps réel</title>
  <meta name="description" content="Comparez les prix des carburants en France sur une carte interactive. SP95, SP98, Gazole, E10, E85, GPLc mis à jour quotidiennement."/>
  <meta name="keywords" content="prix carburant, essence, gazole, station service, France, comparateur, carte, SP95, SP98, E10, E85"/>
  <meta name="author" content="Carbur'Map"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://carburmap.leetcode.agency/"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#e8ff47"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://carburmap.leetcode.agency/"/>
  <meta property="og:title" content="Carbur'Map | Prix carburants France"/>
  <meta property="og:description" content="Comparez les prix des carburants en France sur une carte interactive. Historique, statistiques et prédictions."/>
  <meta property="og:image" content="https://carburmap.leetcode.agency/og-image.svg"/>
  <meta property="og:locale" content="fr_FR"/>
  <meta property="og:site_name" content="Carbur'Map"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Carbur'Map | Prix carburants France"/>
  <meta name="twitter:description" content="Comparez les prix des carburants en France sur une carte interactive."/>
  <meta name="twitter:image" content="https://carburmap.leetcode.agency/og-image.svg"/>
  <link rel="stylesheet" href="css/app.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Carbur'Map",
    "url": "https://carburmap.leetcode.agency",
    "description": "Comparez les prix des carburants en France sur une carte interactive.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "All",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
    "inLanguage": "fr"
  }
  </script>
</head>
<body>

<div id="loader">
  <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:-.04em">Carbur<span style="color:var(--acc)">'</span>Map</div>
  <div class="loader-ring"></div>
  <div id="loader-msg" class="loader-text">Connexion à l'API...</div>
  <div class="loader-prog"><div id="loader-bar" class="loader-bar"></div></div>
</div>

<header>
  <div class="logo">
    Carbur<span class="logo-accent">'</span>Map
  </div>

  <nav>
    <a href="index.html" class="nav-link active">
      <i class="bi bi-map"></i> Carte
    </a>
    <a href="predict.html" class="nav-link">
      <i class="bi bi-graph-up-arrow"></i> Prédictions
    </a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Changer le thème">
      <i class="bi bi-sun"></i>
    </button>
  </nav>

  <div class="status-pill">
    <div class="dot loading"></div>
    <span id="status-text">Chargement...</span>
  </div>

  <button class="burger" id="burger-btn" aria-label="Menu">
    <i class="bi bi-list"></i>
  </button>
</header>

<div class="app-body">
  <div class="sidebar">

    <div class="sb-block">
      <div class="sb-label">Carburant</div>
      <div class="fuel-tabs" id="fuel-tabs">
        <button class="fuel-tab active" data-fuel="SP95">SP95</button>
        <button class="fuel-tab" data-fuel="SP98">SP98</button>
        <button class="fuel-tab" data-fuel="Gazole">Gazole</button>
        <button class="fuel-tab" data-fuel="E10">E10</button>
        <button class="fuel-tab" data-fuel="E85">E85</button>
        <button class="fuel-tab" data-fuel="GPLc">GPLc</button>
      </div>
    </div>

    <div class="sb-block">
      <div class="sb-label">Statistiques</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-val" id="stat-min" style="color:var(--green)">—</div>
          <div class="stat-lbl">Minimum</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-max" style="color:var(--red)">—</div>
          <div class="stat-lbl">Maximum</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-avg" style="color:var(--blue)">—</div>
          <div class="stat-lbl">Moyenne</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-count" style="color:var(--acc)">—</div>
          <div class="stat-lbl">Stations</div>
        </div>
      </div>
    </div>

    <div class="sb-block">
      <div class="sb-label">Filtres</div>
      <div class="filter-row">
        <select class="filter-select" id="filter-dept">
          <option value="">Tous les dép.</option>
        </select>
        <select class="filter-select" id="filter-pop">
          <option value="">Tous types</option>
          <option value="R">Routier</option>
          <option value="A">Autoroute</option>
        </select>
      </div>
    </div>

    <div class="chart-zone">
      <div class="chart-header">
        <div>
          <div class="sb-label" style="margin-bottom:0">Évolution historique</div>
          <div id="chart-sub" style="font-size:.68rem;color:var(--muted)">Prix moyen national</div>
        </div>
        <div class="range-nav">
          <button class="compare-btn" id="compare-btn">Comparer</button>
          <button class="range-btn active" data-days="7">7J</button>
          <button class="range-btn" data-days="14">14J</button>
          <button class="range-btn" data-days="30">30J</button>
        </div>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="history-chart"></canvas>
      </div>
    </div>

    <div class="sb-block" style="border-bottom:0;padding-bottom:.3rem">
      <div class="sb-label">
        <i class="bi bi-trophy"></i> Moins chères
      </div>
    </div>
    <div class="station-list" id="station-list">
      <div style="color:var(--muted);font-size:.75rem;text-align:center;padding-top:14px">Chargement...</div>
    </div>

  </div>

  <div id="map-container">
    <div id="map"></div>

    <div class="map-search-wrap">
      <input class="map-search" id="map-search" type="text" placeholder="Ville, code postal, département..."/>
    </div>

    <div class="map-legend">
      <div class="legend-title">Prix relatif</div>
      <div class="legend-row"><div class="legend-dot" style="background:#4ade80"></div> Moins cher</div>
      <div class="legend-row"><div class="legend-dot" style="background:#e8ff47"></div> Intermédiaire</div>
      <div class="legend-row"><div class="legend-dot" style="background:#f87171"></div> Plus cher</div>
    </div>

    <button class="geo-btn" id="geo-btn" aria-label="Ma position">
      <i class="bi bi-crosshair"></i>
    </button>

    <div id="toast"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script type="module">
  import { initMap, loadStations, setFuel, setDept, setPop, setHistDays, searchStation, flyTo, geolocate, toggleCompare } from './js/map.js';
  import { api } from './js/api.js';

  window.mapModule = { flyTo };

  (function initTheme() {
    const saved = localStorage.getItem('carburmap-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    const icon = document.querySelector('#theme-toggle i');
    if (icon) icon.className = saved === 'light' ? 'bi bi-moon' : 'bi bi-sun';
  })();

  function setLoader(msg, pct) {
    document.getElementById('loader-msg').textContent = msg;
    document.getElementById('loader-bar').style.width = pct + '%';
  }

  function hideLoader() {
    const el = document.getElementById('loader');
    el.classList.add('out');
    setTimeout(() => { el.style.display = 'none'; }, 600);
  }

  async function boot() {
    setLoader('Initialisation de la carte...', 20);
    initMap();

    setLoader('Chargement des départements...', 40);
    try {
      const data = await api.depts();
      const sel = document.getElementById('filter-dept');
      data.departments.forEach((d) => {
        const o = document.createElement('option');
        o.value = d; o.textContent = 'Dép. ' + d;
        sel.appendChild(o);
      });
    } catch (_) {}

    setLoader('Chargement des stations...', 60);
    await loadStations();

    setLoader('Prêt', 100);
    await new Promise((r) => setTimeout(r, 200));
    hideLoader();
  }

  document.getElementById('fuel-tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.fuel-tab');
    if (!btn) return;
    document.querySelectorAll('.fuel-tab').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    setFuel(btn.dataset.fuel);
    document.getElementById('chart-sub').textContent = `Prix moyen ${btn.dataset.fuel}`;
  });

  document.querySelectorAll('.range-btn').forEach((btn) => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.range-btn').forEach((b) => b.classList.remove('active'));
      this.classList.add('active');
      setHistDays(parseInt(this.dataset.days));
    });
  });

  document.getElementById('filter-dept').addEventListener('change', (e) => setDept(e.target.value));
  document.getElementById('filter-pop').addEventListener('change',  (e) => setPop(e.target.value));

  let searchTimer;
  document.getElementById('map-search').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => searchStation(e.target.value), 300);
  });

  document.getElementById('geo-btn').addEventListener('click', () => geolocate());
  document.getElementById('compare-btn').addEventListener('click', () => toggleCompare());

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next === 'dark' ? '' : next);
    if (next === 'dark') document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('carburmap-theme', next);
    const icon = document.querySelector('#theme-toggle i');
    icon.className = next === 'light' ? 'bi bi-moon' : 'bi bi-sun';
  });

  const burger = document.getElementById('burger-btn');
  const sidebar = document.querySelector('.sidebar');
  burger.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    burger.querySelector('i').classList.toggle('bi-list');
    burger.querySelector('i').classList.toggle('bi-x-lg');
  });

  boot();
</script>

</body>
</html>
