<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CarburMap</title>
  <link rel="stylesheet" href="css/app.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <script>
    window.API_BASE = 'http://127.0.0.1:8000';
  </script>
</head>
<body>

<div id="loader">
  <div style="font-weight:800;font-size:1.1rem;letter-spacing:-.03em">CarburMap</div>
  <div class="loader-ring"></div>
  <div id="loader-msg" class="loader-text">Connexion à l'API...</div>
  <div class="loader-prog"><div id="loader-bar" class="loader-bar"></div></div>
</div>

<header>
  <div class="logo">
    <div class="logo-mark"><i class="bi bi-fuel-pump"></i></div>
    CarburMap
    <span class="logo-sub">Prix carburants France</span>
  </div>

  <nav>
    <a href="index.html" class="nav-link active">
      <i class="bi bi-map"></i> Carte
    </a>
    <a href="predict.html" class="nav-link">
      <i class="bi bi-graph-up-arrow"></i> Prédictions
    </a>
  </nav>

  <div class="status-pill">
    <div class="dot loading"></div>
    <span id="status-text">Chargement...</span>
  </div>
</header>

<div class="app-body">
  <div class="sidebar">

    <div class="sb-block">
      <div class="sb-label">Carburant</div>
      <div class="fuel-tabs" id="fuel-tabs">
        <button class="fuel-tab active" data-fuel="SP95">SP95</button>
        <button class="fuel-tab" data-fuel="SP98">SP98</button>
        <button class="fuel-tab" data-fuel="Gazole">Gazole</button>
        <button class="fuel-tab" data-fuel="E10">E10</button>
        <button class="fuel-tab" data-fuel="E85">E85</button>
        <button class="fuel-tab" data-fuel="GPLc">GPLc</button>
      </div>
    </div>

    <div class="sb-block">
      <div class="sb-label">Statistiques</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-val" id="stat-min" style="color:var(--green)">—</div>
          <div class="stat-lbl">Minimum</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-max" style="color:var(--red)">—</div>
          <div class="stat-lbl">Maximum</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-avg" style="color:var(--blue)">—</div>
          <div class="stat-lbl">Moyenne</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-count" style="color:var(--acc)">—</div>
          <div class="stat-lbl">Stations</div>
        </div>
      </div>
    </div>

    <div class="sb-block">
      <div class="sb-label">Filtres</div>
      <div class="filter-row">
        <select class="filter-select" id="filter-dept">
          <option value="">Tous les dép.</option>
        </select>
        <select class="filter-select" id="filter-pop">
          <option value="">Tous types</option>
          <option value="R">Routier</option>
          <option value="A">Autoroute</option>
        </select>
      </div>
    </div>

    <div class="chart-zone">
      <div class="chart-header">
        <div>
          <div class="sb-label" style="margin-bottom:0">Évolution historique</div>
          <div id="chart-sub" style="font-size:.68rem;color:var(--muted)">Prix moyen national</div>
        </div>
        <div class="range-nav">
          <button class="range-btn active" data-days="7">7J</button>
          <button class="range-btn" data-days="14">14J</button>
          <button class="range-btn" data-days="30">30J</button>
        </div>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="history-chart"></canvas>
      </div>
    </div>

    <div class="sb-block" style="border-bottom:0;padding-bottom:.3rem">
      <div class="sb-label">
        <i class="bi bi-trophy"></i> Moins chères
      </div>
    </div>
    <div class="station-list" id="station-list">
      <div style="color:var(--muted);font-size:.75rem;text-align:center;padding-top:14px">Chargement...</div>
    </div>

  </div>

  <div id="map-container">
    <div id="map"></div>

    <div class="map-search-wrap">
      <input class="map-search" id="map-search" type="text" placeholder="Ville, code postal, département..."/>
    </div>

    <div class="map-legend">
      <div class="legend-title">Prix relatif</div>
      <div class="legend-row"><div class="legend-dot" style="background:#4ade80"></div> Moins cher</div>
      <div class="legend-row"><div class="legend-dot" style="background:#e8ff47"></div> Intermédiaire</div>
      <div class="legend-row"><div class="legend-dot" style="background:#f87171"></div> Plus cher</div>
    </div>

    <div id="toast"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script type="module">
  import { initMap, loadStations, setFuel, setDept, setPop, setHistDays, searchStation, flyTo } from './js/map.js';
  import { api } from './js/api.js';

  window.mapModule = { flyTo };

  function setLoader(msg, pct) {
    document.getElementById('loader-msg').textContent = msg;
    document.getElementById('loader-bar').style.width = pct + '%';
  }

  function hideLoader() {
    const el = document.getElementById('loader');
    el.classList.add('out');
    setTimeout(() => { el.style.display = 'none'; }, 600);
  }

  async function boot() {
    setLoader('Initialisation de la carte...', 20);
    initMap();

    setLoader('Chargement des départements...', 40);
    try {
      const data = await api.depts();
      const sel = document.getElementById('filter-dept');
      data.departments.forEach((d) => {
        const o = document.createElement('option');
        o.value = d; o.textContent = 'Dép. ' + d;
        sel.appendChild(o);
      });
    } catch (_) {}

    setLoader('Chargement des stations...', 60);
    await loadStations();

    setLoader('Prêt', 100);
    await new Promise((r) => setTimeout(r, 200));
    hideLoader();
  }

  document.getElementById('fuel-tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.fuel-tab');
    if (!btn) return;
    document.querySelectorAll('.fuel-tab').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    setFuel(btn.dataset.fuel);
    document.getElementById('chart-sub').textContent = `Prix moyen ${btn.dataset.fuel}`;
  });

  document.querySelectorAll('.range-btn').forEach((btn) => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.range-btn').forEach((b) => b.classList.remove('active'));
      this.classList.add('active');
      setHistDays(parseInt(this.dataset.days));
    });
  });

  document.getElementById('filter-dept').addEventListener('change', (e) => setDept(e.target.value));
  document.getElementById('filter-pop').addEventListener('change',  (e) => setPop(e.target.value));

  let searchTimer;
  document.getElementById('map-search').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => searchStation(e.target.value), 300);
  });

  boot();
</script>

</body>
</html>
